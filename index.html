<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Toronto</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="impress-not-supported">

    <div class="fallback-message">
        <p>Your browser doesn't support the features required by impress.js.</p>
        <p>Please use a modern browser like Chrome, Firefox, or Safari.</p>
    </div>

    <div id="impress"
         data-transition-duration="1000"
         data-width="1920"
         data-height="1080"
         data-max-scale="3"
         data-min-scale="0"
         data-perspective="1000">

        <!-- Title Slide -->
        <div id="title" class="step" data-x="0" data-y="0" data-scale="1">
            <h1>Evolve Toronto</h1>
            <p class="subtitle">March 6, 2026</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/gh/impress/impress.js@2.0.0/js/impress.js"></script>
    <script>impress().init();</script>
</body>
</html>
